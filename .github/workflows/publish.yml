name: Release npm

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/publish.yml
      - bun.lock
      - package.json
      - packages/*/package.json

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Publish ${{ matrix.package_dir }}
    runs-on: ubuntu-latest
    concurrency:
      group: release-npm-${{ matrix.package_dir }}
      cancel-in-progress: false
    strategy:
      fail-fast: false
      matrix:
        package_dir:
          - packages/ts-mcp
          - packages/eslint-plugin-zachs-rules
          - packages/prettier-config
          - packages/oxlint-config
          - packages/agent-rules
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Determine release
        id: release
        env:
          BEFORE_SHA: ${{ github.event.before }}
          EVENT_NAME: ${{ github.event_name }}
          GH_TOKEN: ${{ github.token }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          PACKAGE_DIR: ${{ matrix.package_dir }}
        run: |
          set -euo pipefail

          should_publish=false
          should_create_release=false

          write_outputs() {
            echo "should_publish=${should_publish}" >> "$GITHUB_OUTPUT"
            echo "should_create_release=${should_create_release}" >> "$GITHUB_OUTPUT"
          }

          package_json="${PACKAGE_DIR}/package.json"
          package_name="$(node -p "require('./${package_json}').name")"
          package_version="$(node -p "require('./${package_json}').version")"
          safe_package_name="$(printf '%s' "$package_name" | sed 's#^@##; s#/#-#g')"
          release_tag="${safe_package_name}-v${package_version}"

          echo "PACKAGE_DIR=${PACKAGE_DIR}" >> "$GITHUB_ENV"
          echo "PACKAGE_NAME=${package_name}" >> "$GITHUB_ENV"
          echo "PACKAGE_VERSION=${package_version}" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=${release_tag}" >> "$GITHUB_ENV"

          release_candidate=false

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            release_candidate=true
          elif [ "$EVENT_NAME" = "push" ]; then
            if [ -z "${BEFORE_SHA:-}" ] || [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
              release_candidate=true
            else
              previous_package_json="$(git show "${BEFORE_SHA}:${package_json}" 2>/dev/null || true)"

              if [ -z "$previous_package_json" ]; then
                release_candidate=true
              else
                previous_version="$(
                  printf '%s' "$previous_package_json" | node -e "const fs = require('fs'); process.stdout.write(JSON.parse(fs.readFileSync(0, 'utf8')).version)"
                )"

                if [ "$previous_version" = "$package_version" ]; then
                  echo "::notice::${package_name} version stayed at ${package_version}; skipping npm release."
                  write_outputs
                  exit 0
                fi

                node - "$previous_version" "$package_version" <<'NODE'
          const [previous, current] = process.argv.slice(2);

          const parse = (version) => {
            const match = /^(\d+)\.(\d+)\.(\d+)(?:[-+].*)?$/.exec(version);

            if (!match) {
              throw new Error(`Unsupported semver version: ${version}`);
            }

            return match.slice(1, 4).map(Number);
          };

          const previousParts = parse(previous);
          const currentParts = parse(current);
          const comparison =
            currentParts[0] - previousParts[0] ||
            currentParts[1] - previousParts[1] ||
            currentParts[2] - previousParts[2];

          if (comparison <= 0) {
            console.error(`Version must increase before publishing: ${previous} -> ${current}`);
            process.exit(1);
          }
          NODE

                release_candidate=true
              fi
            fi
          fi

          if [ "$release_candidate" != "true" ]; then
            echo "::notice::No release candidate detected for ${package_name}."
            write_outputs
            exit 0
          fi

          published_version="$(npm view "${package_name}@${package_version}" version --prefer-online 2>/dev/null || true)"
          release_exists=false

          if gh release view "$release_tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            release_exists=true
          fi

          if [ "$published_version" = "$package_version" ]; then
            echo "::notice::${package_name}@${package_version} is already published on npm; skipping npm publish."

            if [ "$release_exists" = "false" ]; then
              should_create_release=true
            fi

            write_outputs
            exit 0
          fi

          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "::error::Missing NPM_TOKEN repository secret"
            exit 1
          fi

          if [ "$release_exists" = "true" ]; then
            echo "::error::GitHub release ${release_tag} already exists, but ${package_name}@${package_version} is not published on npm."
            exit 1
          fi

          should_publish=true
          should_create_release=true
          write_outputs

      - name: Set up Bun
        if: steps.release.outputs.should_publish == 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Install dependencies
        if: steps.release.outputs.should_publish == 'true'
        run: bun install --frozen-lockfile

      - name: Install tsgo
        if: steps.release.outputs.should_publish == 'true' && matrix.package_dir == 'packages/ts-mcp'
        run: bun add --global @typescript/native-preview

      - name: Check package
        if: steps.release.outputs.should_publish == 'true'
        run: |
          if node -e "process.exit(require('./${PACKAGE_DIR}/package.json').scripts?.check ? 0 : 1)"; then
            bun run --cwd "$PACKAGE_DIR" check
          fi

      - name: Build package
        if: steps.release.outputs.should_publish == 'true'
        run: |
          if node -e "process.exit(require('./${PACKAGE_DIR}/package.json').scripts?.build ? 0 : 1)"; then
            bun run --cwd "$PACKAGE_DIR" build
          fi

      - name: Publish to npm
        if: steps.release.outputs.should_publish == 'true'
        run: npm publish "$PACKAGE_DIR" --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify npm release
        if: steps.release.outputs.should_publish == 'true'
        run: |
          for attempt in 1 2 3 4 5 6; do
            published_version="$(npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version --prefer-online 2>/dev/null || true)"
            latest_version="$(npm view "${PACKAGE_NAME}" dist-tags.latest --prefer-online 2>/dev/null || true)"

            if [ "$published_version" = "$PACKAGE_VERSION" ] && [ "$latest_version" = "$PACKAGE_VERSION" ]; then
              exit 0
            fi

            echo "Waiting for npm registry metadata to update (${attempt}/6)"
            sleep 10
          done

          if [ "$published_version" != "$PACKAGE_VERSION" ]; then
            echo "::error::Expected ${PACKAGE_NAME}@${PACKAGE_VERSION}, got ${published_version}"
            exit 1
          fi

          if [ "$latest_version" != "$PACKAGE_VERSION" ]; then
            echo "::error::Expected latest dist-tag ${PACKAGE_VERSION}, got ${latest_version}"
            exit 1
          fi

      - name: Create GitHub release
        if: steps.release.outputs.should_create_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "${PACKAGE_NAME}@${PACKAGE_VERSION}" \
            --notes "Published ${PACKAGE_NAME}@${PACKAGE_VERSION} to npm."
